<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>培训记录</title>
  <style>
    :root {
      --bg: #efefef;
      --text: #111;
      --muted: #7a7a7a;
      --card: #ffffff;
      --shadow: 0 8px 24px rgba(0,0,0,0.08);
      --radius: 18px;
      --line: #e7e7e7;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .content {
    }

    .card {
      background: var(--card);
      overflow: hidden;
    }

    .card img {
      display: block;
      width: 100%;
      height: auto;
      background: #fff;
    }

  </style>
</head>
<body>


    <main class="content">
      <section class="card">
        <img src="page2.jpg" alt="培训合格证明正面" />
      </section>

      <section class="card">
        <img src="page3.jpg" alt="培训合格证明记录页" />
      </section>
    </main>
  </div>
</body>
</html>
